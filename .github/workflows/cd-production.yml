name: CD - Production Promotion (ECS)

on:
  workflow_dispatch:
    inputs:
      staging_image_tag:
        description: 'Staging image tag to promote (e.g., staging-abc123...)'
        required: true
      approval_note:
        description: 'Release notes or approval reason'
        required: false

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  pre-deployment-check:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      deployment_id: ${{ steps.create-deployment.outputs.deployment_id }}

    steps:
      - name: Validate image tag
        run: |
          if [[ ! "${{ github.event.inputs.staging_image_tag }}" =~ ^staging-[a-f0-9]{40}$ ]]; then
            echo "::error::Invalid staging image tag. Expected: staging-<commit-sha>"
            exit 1
          fi
          echo "✅ Image tag validated: ${{ github.event.inputs.staging_image_tag }}"

      - name: Create GitHub deployment
        id: create-deployment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'EphOps production: ${{ github.event.inputs.staging_image_tag }}',
              auto_merge: false,
            });
            core.setOutput('deployment_id', deployment.data.id);

  production-deploy:
    name: Deploy to Production (ECS Fargate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre-deployment-check
    environment: production
    permissions:
      contents: write
      deployments: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Retag staging image as production
        id: retag
        run: |
          AWS_ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT}.dkr.ecr.us-east-1.amazonaws.com"
          ECR_REPO="ephops"
          PROD_TAG="prod-${{ github.event.inputs.staging_image_tag }}"
          PROD_IMAGE_URI="${ECR_REGISTRY}/${ECR_REPO}:${PROD_TAG}"

          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin "${ECR_REGISTRY}"
          docker pull "${ECR_REGISTRY}/${ECR_REPO}:${{ github.event.inputs.staging_image_tag }}"
          docker tag  "${ECR_REGISTRY}/${ECR_REPO}:${{ github.event.inputs.staging_image_tag }}" "${PROD_IMAGE_URI}"
          docker tag  "${ECR_REGISTRY}/${ECR_REPO}:${{ github.event.inputs.staging_image_tag }}" "${ECR_REGISTRY}/${ECR_REPO}:prod-latest"
          docker push "${PROD_IMAGE_URI}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:prod-latest"

          echo "prod_image_uri=${PROD_IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "prod_tag=${PROD_TAG}"             >> $GITHUB_OUTPUT

      - name: Capture production image digest
        id: image-meta
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name ephops \
            --image-ids imageTag=${{ steps.retag.outputs.prod_tag }} \
            --region us-east-1 \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          echo "prod_digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: ephops-prod
          container-name: app
          image: ${{ steps.retag.outputs.prod_image_uri }}

      - name: Deploy to ECS production
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          cluster: ephops-prod-cluster
          service: ephops-prod-service
          wait-for-service-stability: true

      - name: Smoke tests
        id: smoke-tests
        run: |
          BASE="${{ secrets.PROD_HEALTH_URL }}"

          echo "--- Test 1: Liveness ---"
          for i in $(seq 1 10); do
            curl -sf "$BASE/health/live" && break
            [ $i -lt 10 ] && sleep 3 || { echo "::error::Liveness check failed"; exit 1; }
          done

          echo "--- Test 2: Readiness ---"
          for i in $(seq 1 10); do
            curl -sf "$BASE/health/ready" && break
            [ $i -lt 10 ] && sleep 3 || { echo "::error::Readiness check failed"; exit 1; }
          done

          echo "--- Test 3 & 4: Health + Database ---"
          HEALTH=$(curl -sf "$BASE/health")
          echo "$HEALTH" | grep -q '"status":"ok"'   || { echo "::error::Health status not ok"; exit 1; }
          echo "$HEALTH" | grep -q '"database":"ok"' || { echo "::error::Database health failed"; exit 1; }

          echo "--- Test 5: Response time < 1s ---"
          TIME=$(curl -sf -o /dev/null -w "%{time_total}" "$BASE/health")
          awk "BEGIN{exit !($TIME < 1.0)}" || echo "::warning::Response time high: ${TIME}s"

          echo "--- Test 6: Sandbox endpoint ---"
          CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$BASE/sandbox" || true)
          echo "$CODE" | grep -qE "^(200|401)$" || { echo "::error::Sandbox returned $CODE"; exit 1; }

          echo "::notice::All smoke tests passed"

      - name: Rollback if smoke tests failed
        if: failure()
        id: rollback
        run: |
          echo "::error::Smoke tests failed — initiating automatic rollback"
          PREV=$(aws ecs list-task-definition-revisions \
            --family-prefix ephops-prod \
            --region us-east-1 \
            --sort DESCENDING \
            --query 'taskDefinitionArns[1]' \
            --output text)

          if [ -z "$PREV" ] || [ "$PREV" = "None" ]; then
            echo "::error::No previous task definition found"
            exit 1
          fi

          aws ecs update-service \
            --cluster ephops-prod-cluster \
            --service ephops-prod-service \
            --task-definition "$PREV" \
            --region us-east-1
          aws ecs wait services-stable \
            --cluster ephops-prod-cluster \
            --services ephops-prod-service \
            --region us-east-1
          echo "rollback_task_def=${PREV}" >> $GITHUB_OUTPUT
          echo "::notice::Rollback complete — service restored to $PREV"
          exit 1

      - name: Update deployment status (success)
        if: success()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.pre-deployment-check.outputs.deployment_id }},
              state: 'success',
              description: 'Production deployment successful',
              environment_url: '${{ secrets.PROD_HEALTH_URL }}/health',
            });

      - name: Update deployment status (failure)
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ needs.pre-deployment-check.outputs.deployment_id }},
              state: 'failure',
              description: 'Production deployment failed',
            });

      - name: Publish release
        if: success()
        uses: softprops/action-gh-release@c062e08bd532815e2082a85261ab4007cf39e221 # v1
        with:
          tag_name: rel-${{ steps.retag.outputs.prod_tag }}
          body: |
            **Image**: ${{ steps.retag.outputs.prod_image_uri }}
            **Image Digest**: ${{ steps.image-meta.outputs.prod_digest }}
            **Promoted from**: ${{ github.event.inputs.staging_image_tag }}
            **Approval note**: ${{ github.event.inputs.approval_note }}
            **Triggered by**: ${{ github.actor }}

      - name: Release evidence summary
        if: always()
        run: |
          {
            echo "## Production Release Evidence"
            echo "- Commit SHA: ${{ github.sha }}"
            echo "- Source Staging Tag: ${{ github.event.inputs.staging_image_tag }}"
            echo "- Production Tag: ${{ steps.retag.outputs.prod_tag }}"
            echo "- Production Image URI: ${{ steps.retag.outputs.prod_image_uri }}"
            echo "- Production Image Digest: ${{ steps.image-meta.outputs.prod_digest }}"
            echo "- Target Environment: production"
            echo "- Smoke Test Result: ${{ steps.smoke-tests.outcome }}"
            echo "- Rollback Result: ${{ steps.rollback.outcome || 'not-triggered' }}"
          } >> "$GITHUB_STEP_SUMMARY"
