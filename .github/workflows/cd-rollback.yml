name: CD - Emergency Rollback (ECS)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for rollback'
        required: true

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  execute-rollback:
    name: Execute Production Rollback (ECS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Create rollback deployment record
        id: create-deployment
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              description: 'Emergency rollback: ${{ github.event.inputs.reason }}',
              auto_merge: false,
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Rollback to previous task definition
        id: rollback
        run: |
          echo "🔙 Emergency rollback — reason: ${{ github.event.inputs.reason }}"

          PREV=$(aws ecs list-task-definition-revisions \
            --family-prefix ephops-prod \
            --region us-east-1 \
            --sort DESCENDING \
            --query 'taskDefinitionArns[1]' \
            --output text)

          if [ -z "$PREV" ] || [ "$PREV" = "None" ]; then
            echo "::error::No previous task definition found"
            exit 1
          fi

          echo "Rolling back to: $PREV"
          aws ecs update-service \
            --cluster ephops-prod-cluster \
            --service ephops-prod-service \
            --task-definition "$PREV" \
            --region us-east-1

          aws ecs wait services-stable \
            --cluster ephops-prod-cluster \
            --services ephops-prod-service \
            --region us-east-1

          echo "prev_task_def=$PREV" >> $GITHUB_OUTPUT
          echo "::notice::Rollback complete — service restored to $PREV"

      - name: Verify health after rollback
        id: verify
        continue-on-error: true
        run: |
          BASE="${{ secrets.PROD_HEALTH_URL }}"
          for i in $(seq 1 10); do
            curl -sf "$BASE/health" && break
            [ $i -lt 10 ] && sleep 5 || { echo "::warning::Health check failed after rollback"; exit 1; }
          done

      - name: Create deployment status
        if: always()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const success = '${{ steps.verify.outcome }}' === 'success';
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.create-deployment.outputs.deployment_id }},
              state: success ? 'success' : 'failure',
              description: success
                ? 'Rollback successful'
                : 'Rollback executed but health check failed',
              environment_url: '${{ secrets.PROD_HEALTH_URL }}/health',
            });

      - name: Rollback evidence summary
        if: always()
        run: |
          {
            echo "## Rollback Evidence"
            echo "- Commit SHA: ${{ github.sha }}"
            echo "- Target Environment: production"
            echo "- Reason: ${{ github.event.inputs.reason }}"
            echo "- Rolled Back Task Definition: ${{ steps.rollback.outputs.prev_task_def || 'unknown' }}"
            echo "- Health Verify Result: ${{ steps.verify.outcome }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 1,
              body: `⚠️ **PRODUCTION ALERT**: Rollback failed!\n- Reason: ${{ github.event.inputs.reason }}\n- Triggered by: @${{ github.actor }}`
            }).catch(() => {});
            core.setFailed('Rollback failed — manual intervention required');
